<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickBiz V4 — Cafe Page Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <span class="topbar-logo">QuickBiz</span>
    <span class="topbar-badge">V4</span>
  </div>

  <!-- WORKSPACE -->
  <div class="workspace">

    <!-- FORM PANEL -->
    <div class="form-panel">

      <div class="section-label">☕ Cafe Details</div>

      <div class="field-group">
        <label>Cafe Name *</label>
        <input type="text" id="cafeName" placeholder="e.g. The Golden Cup" />
      </div>
      <div class="field-group">
        <label>Description</label>
        <textarea id="description" placeholder="A warm cafe nestled in the heart of the city..."></textarea>
      </div>
      <div class="field-group">
        <label>Timings</label>
        <input type="text" id="timings" placeholder="Mon–Sun: 8 AM – 10 PM" />
      </div>

      <div class="section-label">🖼 Images</div>

      <div class="field-group">
        <label>Cover Image URL</label>
        <input type="url" id="coverImg" placeholder="https://..." />
      </div>
      <div class="field-group">
        <label>Gallery Images (comma-separated URLs)</label>
        <textarea id="galleryImgs" placeholder="https://img1.jpg, https://img2.jpg, ..."></textarea>
      </div>

      <div class="section-label">🧾 Menu</div>

      <div class="field-group">
        <label>Menu Text</label>
        <textarea id="menuText" rows="8" placeholder="Hot Drinks
Espresso - ₹80
Cappuccino - ₹120

Cold Drinks
Iced Latte - ₹150
Cold Brew - ₹130"></textarea>
        <div class="menu-hint">Format: Category on first line, then Item - ₹Price. Separate categories with a blank line.</div>
      </div>

      <div class="section-label">📍 Contact & Location</div>

      <div class="field-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="9876543210" />
      </div>
      <div class="field-group">
        <label>Google Maps Link</label>
        <input type="url" id="mapsLink" placeholder="https://maps.google.com/..." />
      </div>

      <div class="section-label">🎨 Theme</div>
      <div class="theme-row">
        <div class="theme-swatch active" data-theme="beige"  title="Beige"></div>
        <div class="theme-swatch"        data-theme="peach"  title="Peach"></div>
        <div class="theme-swatch"        data-theme="mint"   title="Mint"></div>
        <div class="theme-swatch"        data-theme="white"  title="White"></div>
        <div class="theme-swatch"        data-theme="black"  title="Black"></div>
        <div class="theme-swatch"        data-theme="pink"   title="Pink"></div>
      </div>

      <button class="btn-generate" onclick="generatePage()">✨ Generate Page</button>
      <button class="btn-copy"     onclick="copyCode()">⎘ Copy HTML Code</button>

    </div>
    <!-- /FORM PANEL -->

    <!-- PREVIEW PANEL -->
    <div class="preview-panel">
      <div class="preview-toolbar">
        <span class="preview-label">Live Preview</span>
        <span class="preview-pill">📱 Mobile View</span>
      </div>
      <div class="phone-frame">
        <div class="phone-notch">
          <div class="phone-notch-pill"></div>
        </div>
        <div id="previewContent">
          <div class="empty-state">
            <div class="empty-state-icon">☕</div>
            <div class="empty-state-title">Your page lives here</div>
            <div class="empty-state-sub">Fill in the details and hit Generate</div>
          </div>
        </div>
      </div>
    </div>
    <!-- /PREVIEW PANEL -->

  </div>
  <!-- /WORKSPACE -->

  <!-- TOAST NOTIFICATION -->
  <div class="toast" id="toast">✓ HTML copied!</div>

  <script src="script.js"></script>
</body>
</html>
