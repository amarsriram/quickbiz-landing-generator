<!DOCTYPE html>
<html>
<head>
  <title>QuickBiz Cafe Page Generator</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Pacifico&family=Poppins&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>QuickBiz Cafe Page Generator</h1>

  <p class="tagline">
    Create a beautiful mini page for your café in seconds
  </p>

  <div class="card">

    <h3>Enter Business Details</h3>

    <input id="name" placeholder="Cafe Name">
    <input id="desc" placeholder="Short Description">
    <input id="phone" placeholder="Phone Number">
    <input id="image" placeholder="Cover Image URL">
    <input id="menu" placeholder="Coffee: Cappuccino - ₹120; Snacks: Sandwich - ₹150">
    <input id="location" placeholder="Google Maps Link">

    <select id="theme">
      <option value="peach">Peach </option>
      <option value="mint">Mint </option>
      <option value="white">White </option>
      <option value="beige">Beige </option>
      <option value="black">Black </option>
    </select>

    <select id="font">
      <option value="elegant">Elegant</option>
      <option value="cute">Cute</option>
      <option value="modern">Modern</option>
    </select>

    <button onclick="generate()">Create Page</button>

  </div>

  <div id="output"></div>

  <button onclick="copyCode()">Copy Code</button>

</div>

<script src="script.js"></script>

</body>
</html>
