<!DOCTYPE html>
<html>
<head>
  <title>QuickBiz Generator</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Pacifico&family=Poppins&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>QuickBiz Cafe Page Generator</h1>

  <div class="card">

    <input id="name" placeholder="Cafe Name">
    <input id="desc" placeholder="Description">
    <input id="phone" placeholder="Phone Number">

    <input id="image" placeholder="Cover Image URL">
    <input id="gallery" placeholder="Gallery URLs (comma separated)">

    <input id="timings" placeholder="Timings (Mon-Fri: 9AM-10PM; Sat-Sun: 10AM-11PM)">
    <input id="menu" placeholder="Coffee: Cappuccino - ₹120, Latte - ₹140; Snacks: Sandwich - ₹150">

    <input id="location" placeholder="Google Maps Link">
    <input id="instagram" placeholder="Instagram Link">

    <select id="theme">
      <option value="beige">Beige</option>
      <option value="peach">Peach</option>
      <option value="mint">Mint</option>
      <option value="white">White</option>
      <option value="black">Black</option>
    </select>

    <select id="font">
      <option value="modern">Modern</option>
      <option value="elegant">Elegant</option>
      <option value="cute">Cute</option>
    </select>

    <button onclick="generate()">Create Page</button>

  </div>

  <div id="output"></div>
  <button onclick="copyCode()">Copy Code</button>

</div>

<script src="script.js"></script>

</body>
</html>
