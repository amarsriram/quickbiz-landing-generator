<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickBiz v5.1 — Cafe Page Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&family=Lato:wght@300;400;700&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app-shell">

  <!-- ── TOP HEADER ── -->
  <header class="app-header">
    <div class="app-header-left">
      <div class="logo-mark">QB</div>
      <div>
        <h1 class="app-title">QuickBiz</h1>
        <p class="app-sub">Cafe Generator · v5.1</p>
      </div>
    </div>
    <button class="btn-copy-header" onclick="copyOutput()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      Copy HTML
    </button>
  </header>

  <!-- ── TAB BAR ── -->
  <nav class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('edit', this)">✏️ Edit</button>
    <button class="tab-btn" onclick="switchTab('preview', this)">👁 Preview</button>
  </nav>

  <!-- ── COPY STATUS ── -->
  <p class="copy-status" id="copyStatus"></p>

  <!-- ══════════════════════════
       EDIT TAB
  ══════════════════════════ -->
  <div class="tab-panel" id="tab-edit">

    <section class="ctrl-section">
      <h2 class="ctrl-section-title">Basic Info</h2>
      <div class="ctrl-group">
        <label class="ctrl-label">Cafe Name <span class="req">*</span></label>
        <input class="ctrl-input" type="text" id="cafeName" placeholder="e.g. The Roasted Bean" />
      </div>
      <div class="ctrl-group">
        <label class="ctrl-label">Short Description</label>
        <textarea class="ctrl-input ctrl-textarea" id="cafeDesc" placeholder="A cozy corner for coffee lovers..." rows="3"></textarea>
      </div>
      <div class="ctrl-group">
        <label class="ctrl-label">Hero Image URL</label>
        <input class="ctrl-input" type="text" id="heroImage" placeholder="https://..." autocorrect="off" autocapitalize="off" />
      </div>
      <div class="ctrl-group">
        <label class="ctrl-label">Phone Number</label>
        <input class="ctrl-input" type="tel" id="phoneNumber" placeholder="+91 98765 43210" />
      </div>
    </section>

    <section class="ctrl-section">
      <h2 class="ctrl-section-title">Call to Action</h2>
      <div class="ctrl-group">
        <label class="ctrl-label">Top CTA Text</label>
        <input class="ctrl-input" type="text" id="ctaTop" placeholder="🍽 Order your favorites online" />
      </div>
      <div class="ctrl-group">
        <label class="ctrl-label">Bottom CTA Text</label>
        <input class="ctrl-input" type="text" id="ctaBottom" placeholder="🎉 Book your celebrations" />
      </div>
    </section>

    <section class="ctrl-section">
      <h2 class="ctrl-section-title">Gallery</h2>
      <div class="ctrl-group">
        <label class="ctrl-label">Image URLs <span class="hint">(comma-separated, max 6)</span></label>
        <textarea class="ctrl-input ctrl-textarea" id="galleryUrls" placeholder="https://img1.jpg, https://img2.jpg" rows="3"></textarea>
      </div>
    </section>

    <section class="ctrl-section">
      <h2 class="ctrl-section-title">Reviews</h2>
      <div class="ctrl-group">
        <label class="ctrl-label">Reviews <span class="hint">(one per line: Name: Review text)</span></label>
        <textarea class="ctrl-input ctrl-textarea" id="reviewsInput" placeholder="Priya: Best coffee in town!&#10;Rohan: Love the ambience here" rows="5"></textarea>
      </div>
    </section>

    <section class="ctrl-section">
      <h2 class="ctrl-section-title">Menu</h2>
      <div class="ctrl-group">
        <label class="ctrl-label">Menu <span class="hint">(Category, then Item - ₹Price, blank line between categories)</span></label>
        <textarea class="ctrl-input ctrl-textarea" id="menuInput" placeholder="Hot Drinks&#10;Espresso - ₹120&#10;Cappuccino - ₹150&#10;&#10;Snacks&#10;Croissant - ₹90" rows="10"></textarea>
      </div>
    </section>

    <section class="ctrl-section">
      <h2 class="ctrl-section-title">Timings</h2>
      <div class="ctrl-group">
        <label class="ctrl-label">Opening Hours</label>
        <textarea class="ctrl-input ctrl-textarea" id="timingsInput" placeholder="Mon–Fri: 8am – 9pm&#10;Sat–Sun: 9am – 10pm" rows="3"></textarea>
      </div>
    </section>

    <section class="ctrl-section">
      <h2 class="ctrl-section-title">Location</h2>
      <div class="ctrl-group">
        <label class="ctrl-label">Google Maps URL</label>
        <input class="ctrl-input" type="text" id="mapUrl" placeholder="https://maps.google.com/..." autocorrect="off" autocapitalize="off" />
      </div>
    </section>

    <section class="ctrl-section">
      <h2 class="ctrl-section-title">Style</h2>
      <div class="ctrl-group">
        <label class="ctrl-label">Theme</label>
        <select class="ctrl-input ctrl-select" id="themeSelect">
          <option value="theme-warm">☕ Warm Latte</option>
          <option value="theme-dark">🌑 Midnight Roast</option>
          <option value="theme-sage">🌿 Sage Garden</option>
          <option value="theme-cream">🍦 Vanilla Cream</option>
        </select>
      </div>
      <div class="ctrl-group">
        <label class="ctrl-label">Font</label>
        <select class="ctrl-input ctrl-select" id="fontSelect">
          <option value="font-cormorant">Cormorant (Elegant)</option>
          <option value="font-playfair">Playfair (Classic)</option>
          <option value="font-josefin">Josefin (Modern)</option>
        </select>
      </div>
      <div class="ctrl-group">
        <label class="ctrl-label">Texture</label>
        <select class="ctrl-input ctrl-select" id="textureSelect">
          <option value="">None</option>
          <option value="texture-noise">Subtle Noise</option>
          <option value="texture-linen">Linen Weave</option>
          <option value="texture-dots">Dot Grid</option>
        </select>
      </div>
    </section>

    <div class="ctrl-actions">
      <button class="btn-copy" onclick="copyOutput()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy Full HTML
      </button>
    </div>

  </div><!-- /tab-edit -->

  <!-- ══════════════════════════
       PREVIEW TAB
  ══════════════════════════ -->
  <div class="tab-panel hidden" id="tab-preview">
    <div class="preview-device-bar">
      <button class="dev-btn active" onclick="setPreviewWidth(this, '390px')">📱 Mobile</button>
      <button class="dev-btn" onclick="setPreviewWidth(this, '768px')">📟 Tablet</button>
      <button class="dev-btn" onclick="setPreviewWidth(this, '100%')">🖥 Full</button>
    </div>
    <div class="preview-stage" id="previewStage">
      <!-- srcdoc avoids document.write CSP issues on GitHub Pages -->
      <div class="preview-frame-wrap" id="previewFrameWrap">
        <iframe id="previewIframe"
                title="Cafe Page Preview"
                sandbox="allow-same-origin allow-popups"
                srcdoc=""></iframe>
      </div>
    </div>
  </div><!-- /tab-preview -->

</div>

<script src="app.js"></script>
</body>
</html>
