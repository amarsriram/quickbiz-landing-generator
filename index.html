<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickBiz V5.1 — Cafe Landing Page Generator</title>

  <!-- Google Fonts — EXACT as specified -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@400;600&family=Nunito:wght@300;400;600&family=Inter:wght@300;400;600&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════
       BUILDER PANEL (LEFT)
  ══════════════════════════════════════════ -->
  <div class="builder-panel" id="builderPanel">

    <div class="panel-header">
      <div class="panel-logo">
        <span class="logo-icon">☕</span>
        <span class="logo-text">QuickBiz <em>V5.1</em></span>
      </div>
      <p class="panel-sub">Cafe Landing Page Generator</p>
    </div>

    <div class="panel-scroll">

      <!-- ── BASIC INFO ── -->
      <div class="section-block">
        <div class="section-label">
          <span class="section-icon">🏪</span> Basic Info
        </div>

        <div class="field-group">
          <label for="cafeName">Cafe Name</label>
          <input type="text" id="cafeName" placeholder="e.g. Brew & Bloom" />
        </div>

        <div class="field-group">
          <label for="description">Description</label>
          <textarea id="description" rows="3" placeholder="A short tagline or description of your cafe..."></textarea>
        </div>

        <div class="field-group">
          <label for="phone">Phone Number</label>
          <input type="text" id="phone" placeholder="e.g. +91 98765 43210" />
        </div>
      </div>

      <!-- ── COVER IMAGE ── -->
      <div class="section-block">
        <div class="section-label">
          <span class="section-icon">🖼</span> Cover Image
        </div>
        <div class="field-group">
          <label for="coverImage">Cover Image URL</label>
          <input type="text" id="coverImage" placeholder="https://example.com/hero.jpg" />
        </div>
      </div>

      <!-- ── CTA ── -->
      <div class="section-block">
        <div class="section-label">
          <span class="section-icon">📣</span> Call To Action
        </div>
        <div class="field-group">
          <label for="ctaTop">Top CTA Text</label>
          <input type="text" id="ctaTop" placeholder="🍽 Order your favorites online" />
        </div>
        <div class="field-group">
          <label for="ctaBottom">Bottom CTA Text</label>
          <input type="text" id="ctaBottom" placeholder="🎉 Book your celebrations" />
        </div>
      </div>

      <!-- ── GALLERY ── -->
      <div class="section-block">
        <div class="section-label">
          <span class="section-icon">📸</span> Gallery
        </div>
        <div class="field-group">
          <label for="gallery">Image URLs <span class="hint">(comma-separated, max 6)</span></label>
          <textarea id="gallery" rows="3" placeholder="https://url1.jpg, https://url2.jpg, ..."></textarea>
        </div>
      </div>

      <!-- ── REVIEWS ── -->
      <div class="section-block">
        <div class="section-label">
          <span class="section-icon">⭐</span> Reviews
        </div>
        <div class="field-group">
          <label for="reviews">Reviews <span class="hint">(Name: Review text, one per line, max 5)</span></label>
          <textarea id="reviews" rows="4" placeholder="Priya: Best coffee in town!&#10;Rahul: Loved the ambiance."></textarea>
        </div>
      </div>

      <!-- ── MENU ── -->
      <div class="section-block">
        <div class="section-label">
          <span class="section-icon">🍽</span> Menu
        </div>
        <div class="field-group">
          <label for="menu">Menu <span class="hint">(Category on its own line, then Item - ₹Price)</span></label>
          <textarea id="menu" rows="7" placeholder="Hot Drinks&#10;Espresso - ₹120&#10;Cappuccino - ₹150&#10;&#10;Snacks&#10;Croissant - ₹90&#10;Muffin - ₹80"></textarea>
        </div>
      </div>

      <!-- ── TIMINGS ── -->
      <div class="section-block">
        <div class="section-label">
          <span class="section-icon">⏰</span> Timings
        </div>
        <div class="field-group">
          <label for="timings">Opening Hours</label>
          <input type="text" id="timings" placeholder="Mon–Sat: 8 AM – 10 PM | Sun: 9 AM – 8 PM" />
        </div>
      </div>

      <!-- ── MAP ── -->
      <div class="section-block">
        <div class="section-label">
          <span class="section-icon">📍</span> Map
        </div>
        <div class="field-group">
          <label for="mapLink">Google Maps URL</label>
          <input type="text" id="mapLink" placeholder="https://maps.google.com/..." />
        </div>
      </div>

      <!-- ── APPEARANCE ── -->
      <div class="section-block">
        <div class="section-label">
          <span class="section-icon">🎨</span> Appearance
        </div>

        <div class="field-group">
          <label>Theme</label>
          <div class="pill-group" id="themeGroup">
            <button class="pill active" data-value="theme-beige">☕ Beige</button>
            <button class="pill" data-value="theme-peach">🍑 Peach</button>
            <button class="pill" data-value="theme-mint">🌿 Mint</button>
            <button class="pill" data-value="theme-white">🤍 White</button>
            <button class="pill" data-value="theme-dark">🖤 Dark</button>
          </div>
        </div>

        <div class="field-group">
          <label>Font Style</label>
          <div class="pill-group" id="fontGroup">
            <button class="pill active" data-value="font-modern">Modern</button>
            <button class="pill" data-value="font-elegant">Elegant</button>
            <button class="pill" data-value="font-friendly">Friendly</button>
            <button class="pill" data-value="font-minimal">Minimal</button>
            <button class="pill" data-value="font-stylish">Stylish</button>
          </div>
        </div>

        <div class="field-group">
          <label>Texture</label>
          <div class="pill-group" id="textureGroup">
            <button class="pill active" data-value="texture-plain">Plain</button>
            <button class="pill" data-value="texture-grain">Grain</button>
            <button class="pill" data-value="texture-soft">Soft</button>
          </div>
        </div>
      </div>

      <!-- ── EXPORT ── -->
      <div class="section-block">
        <button class="export-btn" id="exportBtn">
          ⬇ Download Landing Page
        </button>
      </div>

    </div><!-- /panel-scroll -->
  </div>
  <!-- END BUILDER PANEL -->


  <!-- ══════════════════════════════════════════
       PREVIEW PANEL (RIGHT)
  ══════════════════════════════════════════ -->
  <div class="preview-wrapper">

    <div class="preview-topbar">
      <div class="preview-label">Live Preview</div>
      <div class="preview-device-icons">
        <button class="dev-btn active" id="devMobile" title="Mobile view">📱</button>
        <button class="dev-btn" id="devDesktop" title="Desktop view">🖥</button>
      </div>
      <!-- Mobile toggle for panel -->
      <button class="panel-toggle-btn" id="panelToggleBtn">✏️ Edit</button>
    </div>

    <div class="preview-stage" id="previewStage">
      <div class="preview-frame mobile" id="previewFrame">
        <!-- Live preview renders here -->
        <div class="preview" id="preview"></div>
      </div>
    </div>

  </div>
  <!-- END PREVIEW PANEL -->

  <script src="script.js"></script>
</body>
</html>
