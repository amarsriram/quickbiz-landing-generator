<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickBiz V5 — Cafe Landing Generator</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Nunito:wght@300;400;600;700&family=Inter:wght@300;400;500;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ════════════════════════════════════════════
     GENERATOR PANEL
════════════════════════════════════════════ -->
<div class="generator-wrap">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark">QB<span>5</span></div>
      <h1 class="sidebar-title">QuickBiz <span>V5</span></h1>
      <p class="sidebar-sub">Cafe Landing Generator</p>
    </div>

    <div class="sidebar-body">

      <!-- ── CAFE INFO ── -->
      <section class="form-section">
        <h2 class="section-label"><span class="label-icon">☕</span> Cafe Info</h2>

        <div class="field-group">
          <label class="field-label">Cafe Name</label>
          <input class="field-input" id="cafeName" type="text" placeholder="e.g. Bloom & Brew" maxlength="60" />
        </div>

        <div class="field-group">
          <label class="field-label">Tagline / Description</label>
          <textarea class="field-input field-textarea" id="cafeDesc" placeholder="A cozy corner for specialty coffee, warm pastries & good vibes." rows="3"></textarea>
        </div>

        <div class="field-group">
          <label class="field-label">Phone Number</label>
          <input class="field-input" id="cafePhone" type="tel" placeholder="+91 98765 43210" />
        </div>

        <div class="field-group">
          <label class="field-label">Google Maps Link</label>
          <input class="field-input" id="cafeMap" type="url" placeholder="https://maps.google.com/..." />
        </div>

        <div class="field-group">
          <label class="field-label">Opening Hours</label>
          <input class="field-input" id="cafeTiming" type="text" placeholder="Mon–Sat: 8 AM – 9 PM  |  Sun: 10 AM – 6 PM" />
        </div>
      </section>

      <!-- ── IMAGES ── -->
      <section class="form-section">
        <h2 class="section-label"><span class="label-icon">🖼</span> Images</h2>

        <div class="field-group">
          <label class="field-label">Cover / Hero Image URL</label>
          <input class="field-input" id="heroImg" type="url" placeholder="https://..." />
        </div>

        <div class="field-group">
          <label class="field-label">Gallery Images <span class="field-hint">(one URL per line, max 6)</span></label>
          <textarea class="field-input field-textarea" id="galleryImgs" placeholder="https://image1.jpg&#10;https://image2.jpg&#10;https://image3.jpg" rows="4"></textarea>
        </div>
      </section>

      <!-- ── MENU ── -->
      <section class="form-section">
        <h2 class="section-label"><span class="label-icon">🍽</span> Menu</h2>
        <p class="field-hint-block">Format: Category on its own line, then Item - ₹Price</p>
        <div class="field-group">
          <textarea class="field-input field-textarea field-mono" id="cafeMenu" rows="10" placeholder="Coffee
Espresso - ₹120
Cappuccino - ₹150
Cold Brew - ₹180

Snacks
Croissant - ₹90
Avocado Toast - ₹220
Banana Bread - ₹110"></textarea>
        </div>
      </section>

      <!-- ── REVIEWS ── -->
      <section class="form-section">
        <h2 class="section-label"><span class="label-icon">⭐</span> Reviews</h2>
        <p class="field-hint-block">Format: Name | Stars (1–5) | Review text (one per line)</p>
        <div class="field-group">
          <textarea class="field-input field-textarea" id="cafeReviews" rows="6" placeholder="Priya S | 5 | Best cappuccino in town. The ambiance is absolutely dreamy!
Rohan M | 5 | Came for the cold brew, stayed for the vibes. 10/10.
Anya K | 4 | Lovely pastries, great music. Will be back for sure."></textarea>
        </div>
      </section>

      <!-- ── STYLE ── -->
      <section class="form-section">
        <h2 class="section-label"><span class="label-icon">🎨</span> Visual Style</h2>

        <div class="field-group">
          <label class="field-label">Theme</label>
          <div class="chip-row" id="themeChips">
            <button class="chip chip-theme active" data-val="beige">🟤 Beige</button>
            <button class="chip chip-theme" data-val="peach">🍑 Peach</button>
            <button class="chip chip-theme" data-val="mint">🌿 Mint</button>
            <button class="chip chip-theme" data-val="white">⬜ White</button>
            <button class="chip chip-theme" data-val="dark">🌑 Dark</button>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Font</label>
          <div class="chip-row" id="fontChips">
            <button class="chip chip-font active" data-val="poppins">Modern</button>
            <button class="chip chip-font" data-val="playfair">Elegant</button>
            <button class="chip chip-font" data-val="nunito">Friendly</button>
            <button class="chip chip-font" data-val="inter">Minimal</button>
            <button class="chip chip-font" data-val="dmsans">Stylish</button>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Texture</label>
          <div class="chip-row" id="textureChips">
            <button class="chip chip-texture active" data-val="plain">Plain</button>
            <button class="chip chip-texture" data-val="grain">Grain</button>
            <button class="chip chip-texture" data-val="soft">Soft</button>
          </div>
        </div>
      </section>

      <!-- ── ACTIONS ── -->
      <section class="form-section actions-section">
        <button class="btn-primary" id="generateBtn">
          <span class="btn-icon">✦</span> Generate Preview
        </button>
        <button class="btn-secondary" id="copyBtn">
          <span class="btn-icon">⎘</span> Copy HTML
        </button>
        <p class="copy-feedback" id="copyFeedback"></p>
      </section>

    </div><!-- /sidebar-body -->
  </aside><!-- /sidebar -->

  <!-- ════════════════════════════════════════
       PREVIEW PANEL
  ════════════════════════════════════════ -->
  <main class="preview-panel">
    <div class="preview-topbar">
      <div class="preview-label">
        <span class="preview-dot"></span>
        Live Preview
      </div>
      <div class="preview-device-pills">
        <button class="device-pill active" data-width="390">📱 Mobile</button>
        <button class="device-pill" data-width="768">📟 Tablet</button>
      </div>
    </div>

    <div class="preview-stage" id="previewStage">
      <div class="phone-frame" id="phoneFrame">
        <iframe id="previewFrame" title="Cafe Preview" scrolling="yes"></iframe>
      </div>
    </div>
  </main>

</div><!-- /generator-wrap -->

<script src="script.js"></script>
</body>
</html>
